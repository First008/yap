tts:
  adapter: openai          # say (free, robotic) | openai (paid, natural)
  # macOS say options:
  # voice: Daniel
  # rate: 195
  # OpenAI TTS options:
  voice: nova              # alloy, ash, ballad, cedar, coral, echo, fable, marin, nova, onyx, sage, shimmer
